# Builds every rune in tome-core from source on each supported platform — the end-to-end
# proof that the catalog and the bootstrap toolchain actually work together — as a
# release-blocking gate. A tag push runs `grm tome build --all --strict` on every platform
# alongside release.yml; any rune that fails to build cleanly fails the tag's checks. Until
# Bootstrap stage 1 (TODO.md) lands on a platform, that platform's job will fail — which is
# the gate doing its job: it refuses to bless a release whose core does not build. Also
# runnable manually (workflow_dispatch) against an arbitrary tome repo for proving runs.
#
# Store-path correctness: archives bake absolute store paths, so publishable artifacts
# must build against the fixed `/grm` store. Linux runners create it; hosted macOS
# runners cannot (sealed system root, and /etc/synthetic.conf needs a reboot), so the
# macOS job builds under GRIMOIRE_ROOT and its artifacts are bootstrap *proof*, not
# publishable — publish macOS dists from a machine with /grm.
#
# The matrix covers linux-gnu (x86_64 + aarch64) and macos-aarch64. The musl and FreeBSD
# stage-1 targets need containers/VMs — add them to the gate as those bootstraps land.
#
# tome-core is intentionally not in this repository (gitignored); the workflow clones it.

name: tome-build

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tome_repo:
        description: Git URL of the core tome repository
        required: false
        default: https://github.com/hermetomancy/tome-core

jobs:
  build-all:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-latest]
    runs-on: ${{ matrix.os }}
    # llvm + rust from source: hours, not minutes.
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Free disk space (Linux)
        if: runner.os == 'Linux'
        # The llvm + rust builds need tens of GB; evict preinstalled bloat first.
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc \
            /usr/local/.ghcup /opt/hostedtoolcache/CodeQL
          df -h /

      - name: Create the fixed store (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo mkdir -p /grm
          sudo chown "$(id -u):$(id -g)" /grm

      - name: Use a workspace store (macOS)
        # Hosted macOS runners cannot create /grm; these artifacts prove the bootstrap
        # but are not publishable (workspace store paths baked in).
        if: runner.os == 'macOS'
        run: echo "GRIMOIRE_ROOT=${{ github.workspace }}/grimoire-root" >> "$GITHUB_ENV"

      - name: Build grm
        run: cargo build --release

      - name: Clone the core tome
        # `inputs.tome_repo` is unset on a tag push; fall back to the canonical tome-core.
        run: git clone --depth 1 "${{ inputs.tome_repo || 'https://github.com/hermetomancy/tome-core' }}" core-tome

      - name: Build every rune
        run: ./target/release/grm tome build --all --strict --path core-tome

      - name: Sign the index
        env:
          MINISIGN_SECRET_KEY: ${{ secrets.MINISIGN_SECRET_KEY }}
        run: |
          if [ -z "$MINISIGN_SECRET_KEY" ]; then
            echo "MINISIGN_SECRET_KEY not available; skipping signature" >&2
            exit 0
          fi
          if [ "$RUNNER_OS" = "macOS" ]; then brew install minisign
          else sudo apt-get update && sudo apt-get install -y minisign; fi
          printf '%s\n' "$MINISIGN_SECRET_KEY" > /tmp/minisign.key
          minisign -S -s /tmp/minisign.key -m core-tome/dist/index.nuon \
            -t "tome-core index ($RUNNER_OS $(uname -m))"
          rm -f /tmp/minisign.key

      - name: Upload built archives
        uses: actions/upload-artifact@v4
        with:
          name: tome-core-dist-${{ matrix.os }}
          path: core-tome/dist/
          if-no-files-found: error
